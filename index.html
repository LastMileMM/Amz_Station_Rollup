var MLABELS=MOM.months.map(function(m){var p=m.split('-');return['Oct','Nov','Dec','Jan','Feb','Mar'][MOM.months.indexOf(m)]+" '"+p[0].slice(2)});
function gm(k){return k==='OVERALL'?WO.overall:WO.stations[k]}
function p2(n,d){return d?(n/d*100).toFixed(1):'0.0'}
function cc(v,hi){if(hi!==false)return v>=85?'gr':v>=70?'ye':'re';return v<=5?'gr':v<=12?'ye':'re'}
function topN(o,n){return Object.entries(o).sort(function(a,b){return b[1]-a[1]}).slice(0,n||5)}
function fmt$(v){return'$'+v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}
function scv(v){return v>=4?'gr':v>=3?'ye':v>=2?'or':'re'}
function scoreColor(v){return v>=4?'var(--gn)':v>=3?'var(--yl)':v>=2?'var(--or)':'var(--rd)'}
function deltaTag(curr,prev,inv){
  if(!prev||!curr)return'<span class="delta nt">—</span>';
  var d=curr-prev,pct=prev?(d/prev*100).toFixed(0):'';
  var up=inv?d<0:d>0;
  if(Math.abs(d)<0.01)return'<span class="delta nt">0%</span>';
  return'<span class="delta '+(up?'up':'dn')+'">'+(d>0?'+':'')+pct+'%</span>';
}
function kpi(label,val,colorCls,borderCls,sub){return'<div class="kp '+(borderCls||'')+'"><div class="lb">'+label+'</div><div class="vl '+(colorCls||'')+'">'+val+'</div>'+(sub?'<div class="sb">'+sub+'</div>':'')+'</div>'}
function getMoM(stn){var d=MOM.mom[stn];if(!d)return null;var out=[];MOM.months.forEach(function(m){out.push(d[m]||{t:0,c:0,x:0,h:0,o:0,avgCost:0,medComp:0,avgComp:0,medResp:0,totCost:0})});return out;}
function buildMoMSection(stn){
  var md=getMoM(stn);if(!md)return'';
  var h='<div class="mom-box"><div class="mom-title">&#x1f4c8; Month-over-Month Trends</div>';
  var last=md[md.length-1],prev=md[md.length-2];
  var compPctLast=last.t?last.c/last.t*100:0,compPctPrev=prev.t?prev.c/prev.t*100:0;
  h+='<div class="kg" style="margin-bottom:16px">';
  h+='<div class="kp or"><div class="lb">Mar WOs</div><div class="vl">'+last.t+' '+deltaTag(last.t,prev.t)+'</div><div class="sb">Feb: '+prev.t+'</div></div>';
  h+='<div class="kp '+(compPctLast>=85?'gr':compPctLast>=70?'ye':'re')+'"><div class="lb">Mar Completion</div><div class="vl '+cc(compPctLast)+'">'+compPctLast.toFixed(1)+'% '+deltaTag(compPctLast,compPctPrev)+'</div><div class="sb">Feb: '+compPctPrev.toFixed(1)+'%</div></div>';
  h+='<div class="kp '+(last.medComp<36?'gr':last.medComp<72?'ye':'re')+'"><div class="lb">Mar Med Completion</div><div class="vl">'+last.medComp+'h '+deltaTag(last.medComp,prev.medComp,true)+'</div><div class="sb">Feb: '+prev.medComp+'h</div></div>';
  h+='<div class="kp '+(last.medResp<12?'gr':last.medResp<24?'ye':'re')+'"><div class="lb">Mar Med Response</div><div class="vl">'+last.medResp+'h '+deltaTag(last.medResp,prev.medResp,true)+'</div><div class="sb">Feb: '+prev.medResp+'h</div></div>';
  h+='</div>';
  var uid=stn.replace(/[^a-zA-Z0-9]/g,'');
  h+='<div class="chart-row"><div class="chart-card"><div class="cc-title">WO Volume &amp; Completion Rate</div><canvas id="momVol_'+uid+'"></canvas></div>';
  h+=''
  h+='<div class="mom-table-wrap"><div class="tw scr"><table><thead><tr><th>Month</th><th>WOs</th><th>Comp%</th><th>Canc%</th><th>Med Comp</th><th>Med Resp</th></tr></thead><tbody>';
  MOM.months.forEach(function(m,i){
    var d2=md[i];
    if(!d2.t){h+='<tr><td>'+MLABELS[i]+'</td><td colspan="7" style="color:var(--dm)">No data</td></tr>';return}
    var cpct=d2.t?d2.c/d2.t*100:0,xpct=d2.t?d2.x/d2.t*100:0;
    h+='<tr><td><strong>'+MLABELS[i]+'</strong></td><td>'+d2.t+'</td>';
    h+='<td><span class="bg '+cc(cpct)+'">'+cpct.toFixed(1)+'%</span></td>';
    h+='<td><span class="bg '+cc(xpct,false)+'">'+xpct.toFixed(1)+'%</span></td>';
    h+='<td>'+d2.medComp+'h</td><td>'+d2.medResp+'h</td></tr>';
  });
  h+='</tbody></table></div></div></div>';return h;
}
function buildSentimentSection(stn){
  var sents=stn==='OVERALL'?SENTIMENT:SENTIMENT.filter(function(s){return s.station===stn});
  var fb=stn==='OVERALL'?FEEDBACK:FEEDBACK.filter(function(f){return f.station===stn});
  var adopt=stn==='OVERALL'?(function(){var tk=0,tl=0;Object.values(ADOPTION).forEach(function(a){tk+=a.kooner;tl+=a.leaked});return{kooner:tk,leaked:tl,adoption:parseFloat((tk/(tk+tl)*100).toFixed(1))}})():ADOPTION[stn]||null;
  var h='<div class="sent-box"><div class="sent-title">&#x1f4ac; Sentiment &amp; Adoption</div>';
  if(adopt){
    var acolor=adopt.adoption>=85?'var(--gn)':adopt.adoption>=70?'var(--yl)':'var(--rd)';
    var abg=adopt.adoption>=85?'#059669':adopt.adoption>=70?'#b45309':'#dc2626';
    h+='<div class="adopt-bar"><div class="ab-lbl">Adoption</div><div class="ab-track"><div class="ab-fill" style="width:'+adopt.adoption+'%;background:'+abg+'">'+adopt.adoption+'%</div><div class="ab-target" title="85% Target"></div></div><div class="ab-val" style="color:'+acolor+'">'+adopt.adoption+'%</div></div>';
    h+='<div style="display:flex;gap:16px;margin-bottom:14px;font-size:11px;color:var(--mu)"><span>Kooner: <strong style="color:var(--gn)">'+adopt.kooner+'</strong></span><span>Leaked: <strong style="color:var(--rd)">'+adopt.leaked+'</strong></span><span>Target: <strong style="color:var(--yl)">85%</strong></span></div>';
  }else{h+='<div style="margin-bottom:14px;font-size:11px;color:var(--dm);font-style:italic">No Kooner adoption data for this station</div>'}
  if(sents.length>0){
    var tr2=0,aS=0,aT=0,aQ=0,aA=0;sents.forEach(function(s){tr2+=s.responses;aS+=s.sat*s.responses;aT+=s.time*s.responses;aQ+=s.qual*s.responses;aA+=s.avg*s.responses});if(tr2){aS/=tr2;aT/=tr2;aQ/=tr2;aA/=tr2}
    h+='<div class="sent-kpis"><div class="sent-kpi"><div class="sk-lb">Responses</div><div class="sk-vl">'+tr2+'</div></div><div class="sent-kpi"><div class="sk-lb">Satisfaction</div><div class="sk-vl '+scv(aS)+'">'+aS.toFixed(1)+'</div></div><div class="sent-kpi"><div class="sk-lb">Timeliness</div><div class="sk-vl '+scv(aT)+'">'+aT.toFixed(1)+'</div></div><div class="sent-kpi"><div class="sk-lb">Quality</div><div class="sk-vl '+scv(aQ)+'">'+aQ.toFixed(1)+'</div></div><div class="sent-kpi"><div class="sk-lb">Overall</div><div class="sk-vl '+scv(aA)+'">'+aA.toFixed(1)+'/5</div></div></div>';
    h+='<div class="tw"><table><thead><tr><th>DSP</th><th>Station</th><th>Resp</th><th>Sat</th><th>Time</th><th>Qual</th><th>Avg</th></tr></thead><tbody>';
    sents.slice().sort(function(a,b){return a.avg-b.avg}).forEach(function(s){h+='<tr><td><strong>'+s.dsp+'</strong></td><td>'+s.station+'</td><td>'+s.responses+'</td><td><span class="bg '+scv(s.sat)+'">'+s.sat.toFixed(1)+'</span></td><td><span class="bg '+scv(s.time)+'">'+s.time.toFixed(1)+'</span></td><td><span class="bg '+scv(s.qual)+'">'+s.qual.toFixed(1)+'</span></td><td><span class="bg '+scv(s.avg)+'">'+s.avg.toFixed(1)+'</span></td></tr>'});
    h+='</tbody></table></div>';
  }else{h+='<div class="no-data">No DSP sentiment survey data for this station</div>'}
  if(fb.length>0){h+='<div class="sc sent">Recent DSP Feedback</div>';fb.forEach(function(f){h+='<div class="fb-card"><div class="fb-hdr"><div><span class="fb-dsp">'+f.dsp+'</span> <span class="fb-date">'+f.date+(stn==='OVERALL'?' &middot; '+f.station:'')+'</span></div><div class="fb-scores"><span>S:<strong style="color:'+scoreColor(f.sat)+'">'+f.sat+'</strong></span><span>T:<strong style="color:'+scoreColor(f.time)+'">'+f.time+'</strong></span><span>Q:<strong style="color:'+scoreColor(f.qual)+'">'+f.qual+'</strong></span></div></div>';if(f.issue)h+='<div class="fb-txt issue">'+f.issue+'</div>';if(f.suggestion)h+='<div class="fb-txt pos">'+f.suggestion+'</div>';h+='</div>'})}
  h+='</div>';return h;
}
function renderCharts(stn){
  chartInstances.forEach(function(c){c.destroy()});chartInstances=[];
  var md=getMoM(stn);if(!md)return;
  var uid=stn.replace(/[^a-zA-Z0-9]/g,'');
  var gridColor='rgba(255,255,255,0.04)',tickColor='#5a6480';
  var baseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8892a8',font:{size:10,family:'DM Sans'}},position:'top'}},animation:{duration:600}};
  var el1=document.getElementById('momVol_'+uid);
  if(el1){
    var c1=new Chart(el1,{type:'bar',data:{labels:MLABELS,datasets:[
      {type:'bar',label:'WO Volume',data:md.map(function(d){return d.t}),backgroundColor:'rgba(91,140,255,0.6)',borderRadius:4,yAxisID:'y',order:2},
      {type:'line',label:'Comp %',data:md.map(function(d){return d.t?(d.c/d.t*100):0}),borderColor:'#34d399',backgroundColor:'rgba(52,211,153,0.1)',tension:.3,pointRadius:4,pointBackgroundColor:'#34d399',fill:true,yAxisID:'y1',order:1}
    ]},options:Object.assign({},baseOpts,{scales:{
      y:{position:'left',grid:{color:gridColor},ticks:{color:tickColor}},
      y1:{position:'right',min:0,max:100,grid:{display:false},ticks:{color:'#34d399',callback:function(v){return v+'%'}}},
      x:{grid:{display:false},ticks:{color:tickColor}}
    }})});
    chartInstances.push(c1);
  }
}

function build(){
  var m=gm(cur),cr=parseFloat(p2(m.completed,m.total)),xr=parseFloat(p2(m.cancelled,m.total));
  var h='<div class="app"><div class="hdr"><div><h1>LAST MILE SCORECARD</h1><div class="sub">'+(cur==='OVERALL'?'All Stations Rollup':'Station: '+cur)+' &mdash; '+m.total.toLocaleString()+' Work Orders</div></div><div class="stamp">WK13 &mdash; Data: 3/28/26</div></div>';
  h+='<div class="tabs"><button class="'+(cur==='OVERALL'?'on':'')+'" data-t="OVERALL">&#9632; Overall</button>';
  names.forEach(function(n){h+='<button class="'+(cur===n?'on':'')+'" data-t="'+n+'">'+n+'</button>'});h+='</div>';
  h+='<div class="kg">';
  h+=kpi('Total WOs',m.total.toLocaleString(),'','gr','');
  h+=kpi('Completion Rate',cr+'%',cc(cr),cc(cr),m.completed+' of '+m.total);
  h+=kpi('Cancel Rate',xr+'%',cc(xr,false),cc(xr,false),m.cancelled+' cancelled');
  h+=kpi('Open / In Progress',m.open.toLocaleString(),m.open>10?'ye':'gr',m.open>10?'ye':'gr',m.on_hold+' on hold');
  h+='</div><div class="kg">';
  var tc=m.median_comp_hrs<36?'gr':m.median_comp_hrs<72?'ye':'re';
  h+=kpi('Med Completion',m.median_comp_hrs+'h',tc,tc,'Avg: '+m.avg_comp_hrs+'h');
  var rc=m.median_resp_hrs<12?'gr':m.median_resp_hrs<24?'ye':'re';
  h+=kpi('Med Response',m.median_resp_hrs+'h',rc,rc,m.resp_count+' measured');
  h+='</div>';
  h+=buildMoMSection(cur);
  h+=buildSentimentSection(cur);
  h+='<div class="sc">Status Distribution</div><div class="bars">';
  topN(m.status_counts,10).forEach(function(e){var w=m.total?(e[1]/m.total*100):0;var c=e[0]==='COMPLETED'?'gr':e[0]==='CANCELLED'?'re':'bl';h+='<div class="br"><div class="bl">'+e[0].replace(/_/g,' ')+'</div><div class="bt"><div class="bf '+c+'" style="width:'+Math.max(w,2)+'%">'+w.toFixed(1)+'%</div></div><div class="bc">'+e[1]+'</div></div>'});
  h+='</div>';
  h+='<div class="duo"><div><div class="sc">By Priority</div><div class="tw"><table><thead><tr><th>Priority</th><th>Count</th><th>%</th></tr></thead><tbody>';
  topN(m.priorities,5).forEach(function(e){var pv=p2(e[1],m.total);h+='<tr><td><strong>'+e[0]+'</strong></td><td>'+e[1]+'</td><td><span class="bg '+(parseFloat(pv)>35?'ye':'gr')+'">'+pv+'%</span></td></tr>'});
  h+='</tbody></table></div></div><div><div class="sc">By Category</div><div class="tw"><table><thead><tr><th>Category</th><th>Count</th><th>%</th></tr></thead><tbody>';
  topN(m.categories,6).forEach(function(e){h+='<tr><td><strong>'+e[0].replace(/_/g,' ')+'</strong></td><td>'+e[1]+'</td><td>'+p2(e[1],m.total)+'%</td></tr>'});
  h+='</tbody></table></div></div></div>';
  h+='<div class="duo"><div><div class="sc">Scheduled vs Non-Scheduled</div><div class="tw"><table><thead><tr><th>Type</th><th>Count</th><th>%</th></tr></thead><tbody>';
  topN(m.types,4).forEach(function(e){h+='<tr><td><strong>'+e[0].replace(/_/g,' ')+'</strong></td><td>'+e[1]+'</td><td>'+p2(e[1],m.total)+'%</td></tr>'});
  h+='</tbody></table></div></div><div><div class="sc">Top Workflows</div><div class="tw"><table><thead><tr><th>Workflow</th><th>Count</th><th>%</th></tr></thead><tbody>';
  topN(m.workflows,8).forEach(function(e){h+='<tr><td><strong>'+e[0].replace(/_/g,' ')+'</strong></td><td>'+e[1]+'</td><td>'+p2(e[1],m.total)+'%</td></tr>'});
  h+='</tbody></table></div></div></div>';
  h+='<div class="sc">Technician Workload</div><div class="tw scr"><table><thead><tr><th>Technician</th><th>WOs</th><th>%</th></tr></thead><tbody>';
  topN(m.technicians,12).forEach(function(e){h+='<tr><td><strong>'+e[0]+'</strong></td><td>'+e[1]+'</td><td>'+p2(e[1],m.total)+'%</td></tr>'});
  h+='</tbody></table></div>';
  var cre=topN(m.cancel_reasons,6),hre=topN(m.hold_reasons,6);
  if(cre.length||hre.length){h+='<div class="duo">';if(cre.length){h+='<div><div class="sc">Cancellation Reasons</div><div class="tw"><table><thead><tr><th>Reason</th><th>Count</th></tr></thead><tbody>';cre.forEach(function(e){h+='<tr><td>'+e[0].replace(/_/g,' ')+'</td><td><span class="bg re">'+e[1]+'</span></td></tr>'});h+='</tbody></table></div></div>'}if(hre.length){h+='<div><div class="sc">Hold Reasons</div><div class="tw"><table><thead><tr><th>Reason</th><th>Count</th></tr></thead><tbody>';hre.forEach(function(e){h+='<tr><td>'+e[0].replace(/_/g,' ')+'</td><td><span class="bg ye">'+e[1]+'</span></td></tr>'});h+='</tbody></table></div></div>'}h+='</div>'}
  if(cur==='OVERALL'){
    h+='<div class="sc">Station Comparison</div><div class="tw scr"><table><thead><tr><th>Station</th><th>WOs</th><th>Comp%</th><th>Cancel%</th><th>Open</th><th>MedComp</th><th>MedResp</th><th>Adoption</th><th>Sentiment</th></tr></thead><tbody>';
    names.forEach(function(sn){var sm=WO.stations[sn],scr2=parseFloat(p2(sm.completed,sm.total)),sxr=parseFloat(p2(sm.cancelled,sm.total));var ad=ADOPTION[sn],adVal=ad?ad.adoption.toFixed(1)+'%':'—',adC=ad?(ad.adoption>=85?'gr':ad.adoption>=70?'ye':'re'):'';var ss=SENTIMENT.filter(function(x){return x.station===sn});var sentVal='—',sentC='';if(ss.length){var tr2=0,ta=0;ss.forEach(function(x){tr2+=x.responses;ta+=x.avg*x.responses});if(tr2){var av=ta/tr2;sentVal=av.toFixed(1)+'/5';sentC=scv(av)}}h+='<tr><td><strong>'+sn+'</strong></td><td>'+sm.total+'</td><td><span class="bg '+cc(scr2)+'">'+scr2+'%</span></td><td><span class="bg '+cc(sxr,false)+'">'+sxr+'%</span></td><td>'+sm.open+'</td><td>'+sm.median_comp_hrs+'h</td><td>'+sm.median_resp_hrs+'h</td><td>'+(adC?'<span class="bg '+adC+'">'+adVal+'</span>':adVal)+'</td><td>'+(sentC?'<span class="bg '+sentC+'">'+sentVal+'</span>':sentVal)+'</td></tr>'});
    h+='</tbody></table></div>';
  }
  h+='</div>';
  document.getElementById('root').innerHTML=h;
  document.querySelectorAll('.tabs button').forEach(function(btn){btn.addEventListener('click',function(){cur=btn.dataset.t;build();window.scrollTo(0,0)})});
  setTimeout(function(){renderCharts(cur)},50);
}
build();
</script>
</body>
</html>
