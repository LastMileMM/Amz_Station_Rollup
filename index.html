function p2(n,d){return d?(n/d*100).toFixed(1):'0.0'}
function cc(v,hi){if(hi!==false)return v>=85?'gr':v>=70?'ye':'re';return v<=5?'gr':v<=12?'ye':'re'}
function tatColor(v){return v===0?'gr':v<=1.5?'gr':v<=3?'ye':'re'}
function tatBg(v){return v===0?'':v<=1.5?'gr':v<=3?'ye':'re'}

function deltaTag(curr,prev,inv){
  if(!prev||!curr)return'<span class="delta nt">—</span>';
  var d=curr-prev,pct=prev?(d/prev*100).toFixed(0):'';
  var up=inv?d<0:d>0;
  if(Math.abs(d)<0.01)return'<span class="delta nt">0%</span>';
  return'<span class="delta '+(up?'up':'dn')+'">'+(d>0?'+':'')+pct+'%</span>';
}

function kpi(label,val,colorCls,borderCls,sub){
  return'<div class="kp '+(borderCls||'')+'"><div class="lb">'+label+'</div><div class="vl '+(colorCls||'')+'">'+val+'</div>'+(sub?'<div class="sb">'+sub+'</div>':'')+'</div>';
}

function getMoM(stn){
  var d=MOM[stn];if(!d)return null;
  return MONTHS.map(function(m){return d[m]||{t:0,c:0,x:0,medComp:0,avgComp:0}});
}

function buildMoMSection(stn){
  var md=getMoM(stn);if(!md)return'';
  var last=md[md.length-1],prev=md[md.length-2];
  var compPctLast=last.t?last.c/last.t*100:0,compPctPrev=prev.t?prev.c/prev.t*100:0;
  var uid=stn.replace(/[^a-zA-Z0-9]/g,'');
  var h='<div class="mom-box"><div class="mom-title">📈 Month-over-Month Trends</div>';
  h+='<div class="kg" style="margin-bottom:16px">';
  h+='<div class="kp or"><div class="lb">Mar WOs</div><div class="vl">'+last.t+' '+deltaTag(last.t,prev.t)+'</div><div class="sb">Feb: '+prev.t+'</div></div>';
  h+='<div class="kp '+(compPctLast>=85?'gr':compPctLast>=70?'ye':'re')+'"><div class="lb">Mar Completion</div><div class="vl '+cc(compPctLast)+'">'+compPctLast.toFixed(1)+'% '+deltaTag(compPctLast,compPctPrev)+'</div><div class="sb">Feb: '+compPctPrev.toFixed(1)+'%</div></div>';
  h+='<div class="kp '+(last.medComp<36?'gr':last.medComp<72?'ye':'re')+'"><div class="lb">Mar Med Comp</div><div class="vl">'+last.medComp+'h '+deltaTag(last.medComp,prev.medComp,true)+'</div><div class="sb">Feb: '+prev.medComp+'h</div></div>';
  h+='<div class="kp '+(last.avgComp<48?'gr':last.avgComp<96?'ye':'re')+'"><div class="lb">Mar Avg Comp</div><div class="vl">'+last.avgComp+'h '+deltaTag(last.avgComp,prev.avgComp,true)+'</div><div class="sb">Feb: '+prev.avgComp+'h</div></div>';
  h+='</div>';
  h+='<div class="chart-row"><div class="chart-card"><div class="cc-title">WO Volume &amp; Completion Rate</div><canvas id="momVol_'+uid+'"></canvas></div>';
  h+='<div class="chart-card"><div class="cc-title">Median Completion Time (hrs)</div><canvas id="momPerf_'+uid+'"></canvas></div></div>';
  h+='<div class="tw scr"><table><thead><tr><th>Month</th><th>Total WOs</th><th>Comp%</th><th>Cancel%</th><th>Med Comp</th><th>Avg Comp</th></tr></thead><tbody>';
  MONTHS.forEach(function(m,i){
    var d2=md[i];
    if(!d2.t){h+='<tr><td>'+MLABELS[i]+'</td><td colspan="5" style="color:var(--dm)">No data</td></tr>';return}
    var cpct=d2.t?d2.c/d2.t*100:0,xpct=d2.t?d2.x/d2.t*100:0;
    h+='<tr><td><strong>'+MLABELS[i]+'</strong></td><td>'+d2.t+'</td>';
    h+='<td><span class="bg '+cc(cpct)+'">'+cpct.toFixed(1)+'%</span></td>';
    h+='<td><span class="bg '+cc(xpct,false)+'">'+xpct.toFixed(1)+'%</span></td>';
    h+='<td>'+d2.medComp+'h</td><td>'+d2.avgComp+'h</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function renderCharts(stn){
  chartInstances.forEach(function(c){c.destroy()});chartInstances=[];
  var md=getMoM(stn);if(!md)return;
  var uid=stn.replace(/[^a-zA-Z0-9]/g,'');
  var gridColor='rgba(255,255,255,0.04)',tickColor='#5a6480';
  var baseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8892a8',font:{size:10,family:'DM Sans'}},position:'top'}},animation:{duration:600}};

  var el1=document.getElementById('momVol_'+uid);
  if(el1){
    var c1=new Chart(el1,{type:'bar',data:{labels:MLABELS,datasets:[
      {type:'bar',label:'WO Volume',data:md.map(function(d){return d.t}),backgroundColor:'rgba(91,140,255,0.6)',borderRadius:4,yAxisID:'y',order:2},
      {type:'line',label:'Comp %',data:md.map(function(d){return d.t?(d.c/d.t*100):0}),borderColor:'#34d399',backgroundColor:'rgba(52,211,153,0.1)',tension:.3,pointRadius:4,pointBackgroundColor:'#34d399',fill:true,yAxisID:'y1',order:1}
    ]},options:Object.assign({},baseOpts,{scales:{
      y:{position:'left',grid:{color:gridColor},ticks:{color:tickColor}},
      y1:{position:'right',min:0,max:100,grid:{display:false},ticks:{color:'#34d399',callback:function(v){return v+'%'}}},
      x:{grid:{display:false},ticks:{color:tickColor}}
    }})});
    chartInstances.push(c1);
  }

  var el2=document.getElementById('momPerf_'+uid);
  if(el2){
    var c2=new Chart(el2,{type:'line',data:{labels:MLABELS,datasets:[
      {label:'Med Comp (h)',data:md.map(function(d){return d.medComp}),borderColor:'#f87171',backgroundColor:'rgba(248,113,113,0.1)',tension:.3,pointRadius:4,pointBackgroundColor:'#f87171',fill:true},
      {label:'Avg Comp (h)',data:md.map(function(d){return d.avgComp}),borderColor:'#fbbf24',backgroundColor:'rgba(251,191,36,0.08)',tension:.3,pointRadius:4,pointBackgroundColor:'#fbbf24',fill:false}
    ]},options:Object.assign({},baseOpts,{scales:{
      y:{grid:{color:gridColor},ticks:{color:tickColor,callback:function(v){return v+'h'}}},
      x:{grid:{display:false},ticks:{color:tickColor}}
    }})});
    chartInstances.push(c2);
  }

  // Weekly trend chart (only for specific station, not OVERALL)
  var wkEl=document.getElementById('weeklyTrend_'+uid);
  if(wkEl && WEEKLY[stn]){
    var c3=new Chart(wkEl,{type:'bar',data:{labels:WEEK_LABELS,datasets:[
      {label:'Completed WOs',data:WEEKLY[stn],backgroundColor:WEEKLY[stn].map(function(v,i){return i===24?'rgba(91,140,255,0.9)':'rgba(91,140,255,0.45)'}),borderRadius:3}
    ]},options:Object.assign({},baseOpts,{plugins:{legend:{display:false}},scales:{
      y:{grid:{color:gridColor},ticks:{color:tickColor}},
      x:{grid:{display:false},ticks:{color:tickColor,maxRotation:45}}
    }})});
    chartInstances.push(c3);
  }

  // Network weekly stacked chart
  var netWkEl=document.getElementById('networkWeekly');
  if(netWkEl && stn==='OVERALL'){
    var colors=['#5b8cff','#34d399','#f87171','#fbbf24','#fb923c','#22d3ee','#a78bfa','#f472b6','#4ade80','#60a5fa','#e879f9','#34d399','#fb923c'];
    var topStn=['HLA2','HDT3','HTP2','HHO3','HCL2','HAU1','HDY1','HSL1','HMS2','HMK4'];
    var c4=new Chart(netWkEl,{type:'bar',data:{labels:WEEK_LABELS,datasets:topStn.map(function(st,i){return{label:st,data:WEEKLY[st],backgroundColor:colors[i],borderRadius:2}})},
      options:Object.assign({},baseOpts,{plugins:{legend:{labels:{color:'#8892a8',font:{size:10}},position:'right'}},scales:{
        y:{stacked:true,grid:{color:gridColor},ticks:{color:tickColor}},
        x:{stacked:true,grid:{display:false},ticks:{color:tickColor,maxRotation:45}}
      }})});
    chartInstances.push(c4);
  }
}

function build(){
  var isOverall = cur==='OVERALL';
  var s = isOverall ? null : STATION_SUMMARY[cur];
  var momData = getMoM(isOverall?'OVERALL':cur);
  var lastMo = momData ? momData[momData.length-1] : null;
  var prevMo = momData ? momData[momData.length-2] : null;
  var uid = cur.replace(/[^a-zA-Z0-9]/g,'');

  var h='<div class="app"><div class="hdr"><div><h1>LAST MILE STATION ROLLUP</h1>';
  h+='<div class="sub">'+(isOverall?'All Stations — Season to Date':'Station: '+cur+' · '+((s&&s.location)||''))+'</div></div>';
  h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div class="stamp">WK13 · Data Period: 10/6/25 – 3/28/26</div><div class="stamp" style="color:var(--dm)">Updated: 3/31/26</div></div></div>';

  // Tabs
  h+='<div class="tabs"><button class="'+(cur==='OVERALL'?'on':'')+'" data-t="OVERALL">■ Overall</button>';
  STATIONS.forEach(function(n){h+='<button class="'+(cur===n?'on':'')+'" data-t="'+n+'">'+n+'</button>'});
  h+='</div>';

  if(isOverall){
    // Network KPIs
    var netComp=Object.values(STATION_SUMMARY).reduce(function(a,s){return a+s.comp},0);
    var netTotal=Object.values(STATION_SUMMARY).reduce(function(a,s){return a+s.total},0);
    var netCanc=Object.values(STATION_SUMMARY).reduce(function(a,s){return a+s.canc},0);
    var compPct=p2(netComp,netTotal);
    h+='<div class="kg">';
    h+=kpi('Total WOs',netTotal.toLocaleString(),'bl','bl','Season to date');
    h+=kpi('Completed',netComp.toLocaleString(),cc(parseFloat(compPct)),cc(parseFloat(compPct)),compPct+'% completion rate');
    h+=kpi('Cancelled',netCanc.toLocaleString(),cc(parseFloat(p2(netCanc,netTotal)),false),cc(parseFloat(p2(netCanc,netTotal)),false),p2(netCanc,netTotal)+'% cancel rate');
    h+=kpi('Active Stations','13','gr','gr','Oct \'25 – Mar \'26');
    h+='</div>';

    // Station comparison table
    h+='<div class="sc">Station Performance — Season to Date</div>';
    h+='<div class="tw scr"><table><thead><tr><th>Station</th><th>Location</th><th>Total WOs</th><th>Comp%</th><th>Cancel%</th><th>Med TAT</th><th>Avg TAT</th><th>Box</th><th>Cargo</th><th>Tractor</th><th>Top Tech</th></tr></thead><tbody>';
    STATIONS.forEach(function(sn){
      var st=STATION_SUMMARY[sn];
      var cpct=parseFloat(p2(st.comp,st.total));
      var xpct=parseFloat(p2(st.canc,st.total));
      var tc=tatColor(st.medTat);
      var topTech=Object.keys(st.topTechs)[0]||'—';
      var topTechWos=Object.values(st.topTechs)[0]||0;
      h+='<tr><td><strong style="font-family:var(--mo);color:var(--ac)">'+sn+'</strong></td>';
      h+='<td style="color:var(--mu);font-size:11px">'+st.location+'</td>';
      h+='<td>'+st.total+'</td>';
      h+='<td><span class="bg '+cc(cpct)+'">'+cpct.toFixed(1)+'%</span></td>';
      h+='<td><span class="bg '+cc(xpct,false)+'">'+xpct.toFixed(1)+'%</span></td>';
      h+='<td><span class="bg '+tc+'">'+st.medTat+'d</span></td>';
      h+='<td><span class="bg '+tatColor(st.avgTat)+'">'+st.avgTat+'d</span></td>';
      h+='<td style="font-family:var(--mo)">'+st.box+'</td>';
      h+='<td style="font-family:var(--mo)">'+st.cargo+'</td>';
      h+='<td style="font-family:var(--mo)">'+st.tractor+'</td>';
      h+='<td style="font-size:11px;color:var(--mu)">'+topTech+' ('+topTechWos+')</td></tr>';
    });
    h+='</tbody></table></div>';

    // Status distribution bars
    h+='<div class="sc">WO Volume by Station (Season)</div><div class="bars">';
    var maxVol=Math.max.apply(null,STATIONS.map(function(sn){return STATION_SUMMARY[sn].total}));
    STATIONS.forEach(function(sn){
      var st=STATION_SUMMARY[sn];
      var w=Math.max((st.total/maxVol)*100,2);
      var cls=tatColor(st.medTat);
      h+='<div class="br"><div class="bl-lbl">'+sn+'</div><div class="bt"><div class="bf '+cls+'" style="width:'+w+'%">'+st.total+'</div></div><div class="bc">'+st.medTat+'d</div></div>';
    });
    h+='</div>';

    h+=buildMoMSection('OVERALL');

    // Network weekly chart
    h+='<div class="sc">Weekly Volume — Network (All Stations Stacked)</div>';
    h+='<div class="chart-card" style="margin-bottom:20px"><canvas id="networkWeekly" style="height:280px!important"></canvas></div>';

  } else {
    // Individual station view
    var cpct=parseFloat(p2(s.comp,s.total));
    var xpct=parseFloat(p2(s.canc,s.total));
    h+='<div class="kg">';
    h+=kpi('Total WOs',s.total,'bl','bl','Season to date');
    h+=kpi('Completed',s.comp,cc(cpct),cc(cpct),cpct.toFixed(1)+'% completion rate');
    h+=kpi('Cancelled',s.canc,cc(xpct,false),cc(xpct,false),xpct.toFixed(1)+'% cancel rate');
    h+=kpi('Open/In Progress',s.open,s.open>5?'ye':'gr',s.open>5?'ye':'gr','currently open');
    h+='</div><div class="kg">';
    h+=kpi('Med TAT (Season)',s.medTat+'d',tatColor(s.medTat),tatColor(s.medTat),'Median completion time');
    h+=kpi('Avg TAT (Season)',s.avgTat+'d',tatColor(s.avgTat),tatColor(s.avgTat),'Average completion time');
    h+=kpi('Box Trucks',s.box,'bl','bl',p2(s.box,s.comp)+'% of completed');
    h+=kpi('Cargo Vehicles',s.cargo,'cy','cy',p2(s.cargo,s.comp)+'% of completed');
    h+='</div>';

    // Weekly trend
    h+='<div class="sc">Weekly Completed WOs — WK41\'25 to WK13\'26</div>';
    h+='<div class="chart-card" style="margin-bottom:20px"><canvas id="weeklyTrend_'+uid+'" style="height:220px!important"></canvas></div>';

    h+=buildMoMSection(cur);

    // Top technicians
    h+='<div class="sc">Top Technicians — Season to Date</div>';
    h+='<div class="tw"><table><thead><tr><th>Technician</th><th>Completed WOs</th><th>Share</th></tr></thead><tbody>';
    var techs=s.topTechs;
    Object.entries(techs).forEach(function(e){
      var pct=p2(e[1],s.comp);
      h+='<tr><td><strong>'+e[0]+'</strong></td><td style="font-family:var(--mo)">'+e[1]+'</td>';
      h+='<td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:8px;background:var(--sf2);border-radius:4px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:var(--ac);border-radius:4px"></div></div><span style="font-family:var(--mo);font-size:11px;color:var(--mu);width:36px">'+pct+'%</span></div></td></tr>';
    });
    h+='</tbody></table></div>';

    // Monthly detail table already in MoM section
  }

  h+='</div>';
  document.getElementById('root').innerHTML=h;
  document.querySelectorAll('.tabs button').forEach(function(btn){
    btn.addEventListener('click',function(){cur=btn.dataset.t;build();window.scrollTo(0,0)});
  });
  setTimeout(function(){renderCharts(cur)},50);
}

build();
</script>
</body>
</html>
