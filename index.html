<style>
:root{--bg:#080a10;--sf:#111420;--sf2:#181c2a;--bd:#222840;--ac:#5b8cff;--ac2:#7c6cff;--gn:#34d399;--gnb:rgba(52,211,153,.1);--yl:#fbbf24;--ylb:rgba(251,191,36,.1);--rd:#f87171;--rdb:rgba(248,113,113,.1);--or:#fb923c;--orb:rgba(251,146,60,.1);--cy:#22d3ee;--cyb:rgba(34,211,238,.1);--tx:#e4e8f1;--mu:#8892a8;--dm:#5a6480;--fn:'DM Sans',sans-serif;--mo:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.app{max-width:1440px;margin:0 auto;padding:24px 28px}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.02em;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--mu);font-size:12.5px;margin-top:3px}
.hdr .stamp{font-family:var(--mo);font-size:10px;color:var(--dm);background:var(--sf);padding:5px 10px;border-radius:5px;border:1px solid var(--bd)}
.tabs{display:flex;gap:3px;margin-bottom:24px;overflow-x:auto;padding-bottom:3px}
.tabs button{padding:8px 16px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--mu);font-family:var(--fn);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tabs button:hover{color:var(--tx);background:var(--sf);border-color:var(--bd)}
.tabs button.on{background:linear-gradient(135deg,rgba(91,140,255,.15),rgba(124,108,255,.15));color:var(--ac);border-color:rgba(91,140,255,.3)}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:1100px){.kg{grid-template-columns:repeat(2,1fr)}}@media(max-width:600px){.kg{grid-template-columns:1fr}}
.kp{background:var(--sf);border:1px solid var(--bd);border-radius:11px;padding:16px 18px;position:relative;overflow:hidden}
.kp::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kp.gr::after{background:var(--gn)}.kp.ye::after{background:var(--yl)}.kp.re::after{background:var(--rd)}.kp.cy::after{background:var(--cy)}.kp.or::after{background:var(--or)}
.kp .lb{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);margin-bottom:6px;font-weight:600}
.kp .vl{font-family:var(--mo);font-size:24px;font-weight:700;line-height:1}
.kp .vl.gr{color:var(--gn)}.kp .vl.ye{color:var(--yl)}.kp .vl.re{color:var(--rd)}.kp .vl.or{color:var(--or)}.kp .vl.cy{color:var(--cy)}
.kp .sb{font-size:10px;color:var(--dm);margin-top:5px}
.delta{font-size:10px;font-family:var(--mo);font-weight:600;margin-left:4px}
.delta.up{color:var(--gn)}.delta.dn{color:var(--rd)}.delta.nt{color:var(--mu)}
.sc{font-size:13px;font-weight:700;margin:20px 0 12px;color:var(--tx);display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
.sc::before{content:'';width:3px;height:14px;border-radius:2px;background:linear-gradient(180deg,var(--ac),var(--ac2))}
.sc.sent::before{background:linear-gradient(180deg,var(--cy),var(--ac2))}
.sc.mom::before{background:linear-gradient(180deg,var(--or),var(--yl))}
.tw{background:var(--sf);border:1px solid var(--bd);border-radius:11px;overflow:hidden;margin-bottom:16px}
.tw.scr{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 14px;text-align:left;font-weight:600;color:var(--mu);text-transform:uppercase;font-size:9.5px;letter-spacing:.06em;border-bottom:1px solid var(--bd);background:rgba(91,140,255,.03);white-space:nowrap}
td{padding:8px 14px;border-bottom:1px solid rgba(34,40,64,.5)}
tr:last-child td{border-bottom:none}tr:hover{background:rgba(91,140,255,.02)}
td strong{font-weight:600;color:var(--tx)}
.bg{display:inline-block;padding:2px 9px;border-radius:18px;font-size:9.5px;font-weight:700;font-family:var(--mo);letter-spacing:.02em}
.bg.gr{background:var(--gnb);color:var(--gn)}.bg.ye{background:var(--ylb);color:var(--yl)}.bg.re{background:var(--rdb);color:var(--rd)}.bg.or{background:var(--orb);color:var(--or)}.bg.cy{background:var(--cyb);color:var(--cy)}
.bars{margin-bottom:20px}
.br{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.br .bl{width:95px;font-size:11px;color:var(--mu);text-align:right;flex-shrink:0;font-weight:500}
.br .bt{flex:1;height:20px;background:var(--sf2);border-radius:4px;overflow:hidden;border:1px solid var(--bd)}
.br .bf{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:7px;font-size:9.5px;font-weight:700;color:#fff;font-family:var(--mo);min-width:30px;transition:width .5s ease}
.bf.gr{background:linear-gradient(90deg,#059669,var(--gn))}.bf.ye{background:linear-gradient(90deg,#b45309,var(--yl))}.bf.re{background:linear-gradient(90deg,#dc2626,var(--rd))}.bf.bl{background:linear-gradient(90deg,#3b6cf5,var(--ac))}.bf.cy{background:linear-gradient(90deg,#0891b2,var(--cy))}
.br .bc{width:38px;font-size:10.5px;color:var(--dm);font-family:var(--mo);font-weight:500}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:800px){.duo{grid-template-columns:1fr}}
.sent-box{background:linear-gradient(135deg,rgba(34,211,238,.06),rgba(124,108,255,.06));border:1px solid rgba(34,211,238,.2);border-radius:12px;padding:20px;margin-bottom:20px}
.sent-box .sent-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--cy)}
.sent-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.sent-kpi{background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:12px 14px;text-align:center}
.sent-kpi .sk-lb{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:4px}
.sent-kpi .sk-vl{font-family:var(--mo);font-size:20px;font-weight:700}
.fb-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.fb-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.fb-dsp{font-family:var(--mo);font-weight:600;font-size:12px}
.fb-date{font-size:10px;color:var(--dm)}
.fb-scores{display:flex;gap:10px;font-family:var(--mo);font-size:10px;color:var(--mu)}
.fb-scores span{display:flex;align-items:center;gap:3px}
.fb-txt{font-size:11.5px;color:var(--mu);line-height:1.5;font-style:italic;padding:8px 0 0;border-top:1px solid var(--bd);margin-top:6px}
.fb-txt.issue{border-left:2px solid var(--rd);padding-left:10px;margin-bottom:6px;border-top:none;padding-top:0}
.fb-txt.pos{border-left:2px solid var(--gn);padding-left:10px;border-top:none;padding-top:0}
.no-data{text-align:center;padding:20px;color:var(--dm);font-size:12px;font-style:italic}
.adopt-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.adopt-bar .ab-lbl{font-size:11px;color:var(--mu);min-width:70px}
.adopt-bar .ab-track{flex:1;height:18px;background:var(--sf2);border-radius:4px;overflow:hidden;position:relative}
.adopt-bar .ab-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;font-family:var(--mo)}
.adopt-bar .ab-target{position:absolute;top:0;bottom:0;width:2px;background:var(--yl);left:85%}
.adopt-bar .ab-val{font-family:var(--mo);font-size:12px;font-weight:600;min-width:48px;text-align:right}
.mom-box{background:linear-gradient(135deg,rgba(251,146,60,.05),rgba(251,191,36,.05));border:1px solid rgba(251,146,60,.2);border-radius:12px;padding:20px;margin-bottom:20px}
.mom-box .mom-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--or)}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:900px){.chart-row{grid-template-columns:1fr}}
.chart-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px}
.chart-card .cc-title{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.chart-card canvas{width:100%!important;height:200px!important}
.mom-table-wrap{margin-top:12px}

/* WoW chart */
.wow-box{background:linear-gradient(135deg,rgba(124,108,255,.05),rgba(91,140,255,.05));border:1px solid rgba(124,108,255,.2);border-radius:12px;padding:20px;margin-bottom:20px}
.wow-box .wow-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--ac)}

.wow-chart-card .cc-title{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.wow-chart-card canvas{width:100%!important;height:240px!important}

function gm(k){return k==='OVERALL'?WO.overall:WO.stations[k]}

function cc(v,hi){if(hi!==false)return v>=85?'gr':v>=70?'ye':'re';return v<=5?'gr':v<=12?'ye':'re'}
function topN(o,n){return Object.entries(o).sort(function(a,b){return b[1]-a[1]}).slice(0,n||5)}
function scv(v){return v>=4?'gr':v>=3?'ye':v>=2?'or':'re'}
function scoreColor(v){return v>=4?'var(--gn)':v>=3?'var(--yl)':v>=2?'var(--or)':'var(--rd)'}

function deltaTag(curr,prev,inv){
  if(!prev||!curr)return'<span class="delta nt">—</span>';
  var d=curr-prev,pct=prev?(d/prev*100).toFixed(0):'';
  var up=inv?d<0:d>0;
  if(Math.abs(d)<0.01)return'<span class="delta nt">0%</span>';
  return'<span class="delta '+(up?'up':'dn')+'">'+(d>0?'+':'')+pct+'%</span>';
}
function kpi(label,val,colorCls,borderCls,sub){return'<div class="kp '+(borderCls||'')+'"><div class="lb">'+label+'</div><div class="vl '+(colorCls||'')+'">'+val+'</div>'+(sub?'<div class="sb">'+sub+'</div>':'')+'</div>'}

function getMoM(stn){
  var d=MOM.mom[stn];if(!d)return null;
  return MOM.months.map(function(m){return d[m]||{t:0,c:0,x:0,h:0,o:0,medComp:0,avgComp:0,medResp:0}});
}

function buildMoMSection(stn){
  var md=getMoM(stn);if(!md)return'';
  var last=md[md.length-1],prev=md[md.length-2];
  var compLast=last.t?last.c/last.t*100:0,compPrev=prev.t?prev.c/prev.t*100:0;
  var h='<div class="mom-box"><div class="mom-title">&#x1f4c8; Month-over-Month Trends</div>';
  h+='<div class="kg" style="margin-bottom:16px">';
  h+=kpi('Feb WOs',last.t+' '+deltaTag(last.t,prev.t),'or','or','Jan: '+prev.t);
  h+=kpi('Feb Completion',compLast.toFixed(1)+'% '+deltaTag(compLast,compPrev),cc(compLast),cc(compLast),'Jan: '+compPrev.toFixed(1)+'%');
  h+=kpi('Feb Med Completion',last.medComp+'h '+deltaTag(last.medComp,prev.medComp,true),last.medComp<36?'gr':last.medComp<72?'ye':'re',last.medComp<36?'gr':last.medComp<72?'ye':'re','Jan: '+prev.medComp+'h');
  h+=kpi('Feb Med Response',last.medResp+'h '+deltaTag(last.medResp,prev.medResp,true),last.medResp<12?'gr':last.medResp<24?'ye':'re',last.medResp<12?'gr':last.medResp<24?'ye':'re','Jan: '+prev.medResp+'h');
  h+='</div>';
  var uid=stn.replace(/[^a-zA-Z0-9]/g,'');
  h+='<div class="chart-row"><div class="chart-card"><div class="cc-title">WO Volume &amp; Completion Rate</div><canvas id="momVol_'+uid+'"></canvas></div>';
  h+='<div class="chart-card"><div class="cc-title">Median Completion &amp; Response Time</div><canvas id="momPerf_'+uid+'"></canvas></div></div>';
  h+='<div class="mom-table-wrap"><div class="tw scr"><table><thead><tr><th>Month</th><th>WOs</th><th>Comp%</th><th>Canc%</th><th>Med Comp</th><th>Med Resp</th></tr></thead><tbody>';
  MOM.months.forEach(function(m,i){
    var d2=md[i];
    if(!d2.t){h+='<tr><td>'+MLABELS[i]+'</td><td colspan="5" style="color:var(--dm)">No data</td></tr>';return}
    var cp=d2.c/d2.t*100,xp=d2.x/d2.t*100;
    h+='<tr><td><strong>'+MLABELS[i]+'</strong></td><td>'+d2.t+'</td>';
    h+='<td><span class="bg '+cc(cp)+'">'+cp.toFixed(1)+'%</span></td>';
    h+='<td><span class="bg '+cc(xp,false)+'">'+xp.toFixed(1)+'%</span></td>';
    h+='<td>'+d2.medComp+'h</td><td>'+d2.medResp+'h</td></tr>';
  });
  h+='</tbody></table></div></div></div>';
  return h;
}

function buildSentimentSection(stn){
  var sents=stn==='OVERALL'?SENTIMENT:SENTIMENT.filter(function(s){return s.station===stn});
  var fb=stn==='OVERALL'?FEEDBACK:FEEDBACK.filter(function(f){return f.station===stn});
  var adopt=stn==='OVERALL'?(function(){var tk=0,tl=0;Object.values(ADOPTION).forEach(function(a){tk+=a.kooner;tl+=a.leaked});return{kooner:tk,leaked:tl,adoption:parseFloat((tk/(tk+tl)*100).toFixed(1))}})():ADOPTION[stn]||null;

  if(adopt){
    var ac2=adopt.adoption>=85?'var(--gn)':adopt.adoption>=70?'var(--yl)':'var(--rd)';
    var abg=adopt.adoption>=85?'#059669':adopt.adoption>=70?'#b45309':'#dc2626';
    h+='<div class="adopt-bar"><div class="ab-lbl">Adoption</div><div class="ab-track"><div class="ab-fill" style="width:'+adopt.adoption+'%;background:'+abg+'">'+adopt.adoption+'%</div><div class="ab-target"></div></div><div class="ab-val" style="color:'+ac2+'">'+adopt.adoption+'%</div></div>';
    h+='<div style="display:flex;gap:16px;margin-bottom:14px;font-size:11px;color:var(--mu)"><span>Kooner: <strong style="color:var(--gn)">'+adopt.kooner+'</strong></span><span>Leaked: <strong style="color:var(--rd)">'+adopt.leaked+'</strong></span><span>Target: <strong style="color:var(--yl)">85%</strong></span></div>';
  }else{h+='<div style="margin-bottom:14px;font-size:11px;color:var(--dm);font-style:italic">No Kooner adoption data for this station</div>'}
  if(sents.length>0){
    var tr2=0,aS=0,aT=0,aQ=0,aA=0;
    sents.forEach(function(s){tr2+=s.responses;aS+=s.sat*s.responses;aT+=s.time*s.responses;aQ+=s.qual*s.responses;aA+=s.avg*s.responses});
    if(tr2){aS/=tr2;aT/=tr2;aQ/=tr2;aA/=tr2}
    h+='<div class="sent-kpis"><div class="sent-kpi"><div class="sk-lb">Responses</div><div class="sk-vl">'+tr2+'</div></div><div class="sent-kpi"><div class="sk-lb">Satisfaction</div><div class="sk-vl '+scv(aS)+'">'+aS.toFixed(1)+'</div></div><div class="sent-kpi"><div class="sk-lb">Timeliness</div><div class="sk-vl '+scv(aT)+'">'+aT.toFixed(1)+'</div></div><div class="sent-kpi"><div class="sk-lb">Quality</div><div class="sk-vl '+scv(aQ)+'">'+aQ.toFixed(1)+'</div></div><div class="sent-kpi"><div class="sk-lb">Overall</div><div class="sk-vl '+scv(aA)+'">'+aA.toFixed(1)+'/5</div></div></div>';
    h+='<div class="tw"><table><thead><tr><th>DSP</th><th>Station</th><th>Resp</th><th>Sat</th><th>Time</th><th>Qual</th><th>Avg</th></tr></thead><tbody>';
    sents.slice().sort(function(a,b){return a.avg-b.avg}).forEach(function(s){
      h+='<tr><td><strong>'+s.dsp+'</strong></td><td>'+s.station+'</td><td>'+s.responses+'</td><td><span class="bg '+scv(s.sat)+'">'+s.sat.toFixed(1)+'</span></td><td><span class="bg '+scv(s.time)+'">'+s.time.toFixed(1)+'</span></td><td><span class="bg '+scv(s.qual)+'">'+s.qual.toFixed(1)+'</span></td><td><span class="bg '+scv(s.avg)+'">'+s.avg.toFixed(1)+'</span></td></tr>';
    });
    h+='</tbody></table></div>';
  }else{h+='<div class="no-data">No DSP sentiment survey data for this station</div>'}
  if(fb.length>0){
    h+='<div class="sc sent">Recent DSP Feedback</div>';
    fb.forEach(function(f){
      h+='<div class="fb-card"><div class="fb-hdr"><div><span class="fb-dsp">'+f.dsp+'</span> <span class="fb-date">'+f.date+(stn==='OVERALL'?' &middot; '+f.station:'')+'</span></div><div class="fb-scores"><span>S:<strong style="color:'+scoreColor(f.sat)+'">'+f.sat+'</strong></span><span>T:<strong style="color:'+scoreColor(f.time)+'">'+f.time+'</strong></span><span>Q:<strong style="color:'+scoreColor(f.qual)+'">'+f.qual+'</strong></span></div></div>';
      if(f.issue)h+='<div class="fb-txt issue">'+f.issue+'</div>';
      if(f.suggestion)h+='<div class="fb-txt pos">'+f.suggestion+'</div>';
      h+='</div>';
    });
  }
  h+='</div>';return h;
}

  h+='</tbody></table></div></div></div>';
  h+='<div class="duo"><div><div class="sc">Scheduled vs Non-Scheduled</div><div class="tw"><table><thead><tr><th>Type</th><th>Count</th><th>%</th></tr></thead><tbody>';
  topN(m.types,4).forEach(function(e){h+='<tr><td><strong>'+e[0].replace(/_/g,' ')+'</strong></td><td>'+e[1]+'</td><td>'+p2(e[1],m.total)+'%</td></tr>'});
  h+='</tbody></table></div></div><div><div class="sc">Top Workflows</div><div class="tw"><table><thead><tr><th>Workflow</th><th>Count</th><th>%</th></tr></thead><tbody>';
  topN(m.workflows,8).forEach(function(e){h+='<tr><td><strong>'+e[0].replace(/_/g,' ')+'</strong></td><td>'+e[1]+'</td><td>'+p2(e[1],m.total)+'%</td></tr>'});
  h+='</tbody></table></div></div></div>';
  h+='<div class="sc">Technician Workload</div><div class="tw scr"><table><thead><tr><th>Technician</th><th>WOs</th><th>%</th></tr></thead><tbody>';
  topN(m.technicians,12).forEach(function(e){h+='<tr><td><strong>'+e[0]+'</strong></td><td>'+e[1]+'</td><td>'+p2(e[1],m.total)+'%</td></tr>'});
  h+='</tbody></table></div>';
  var cre=topN(m.cancel_reasons,6),hre=topN(m.hold_reasons,6);
  if(cre.length||hre.length){
    h+='<div class="duo">';
    if(cre.length){h+='<div><div class="sc">Cancellation Reasons</div><div class="tw"><table><thead><tr><th>Reason</th><th>Count</th></tr></thead><tbody>';cre.forEach(function(e){h+='<tr><td>'+e[0].replace(/_/g,' ')+'</td><td><span class="bg re">'+e[1]+'</span></td></tr>'});h+='</tbody></table></div></div>'}
    if(hre.length){h+='<div><div class="sc">Hold Reasons</div><div class="tw"><table><thead><tr><th>Reason</th><th>Count</th></tr></thead><tbody>';hre.forEach(function(e){h+='<tr><td>'+e[0].replace(/_/g,' ')+'</td><td><span class="bg ye">'+e[1]+'</span></td></tr>'});h+='</tbody></table></div></div>'}
    h+='</div>';
  }
  if(cur==='OVERALL'){
    h+='<div class="sc">Station Comparison</div><div class="tw scr"><table><thead><tr><th>Station</th><th>WOs</th><th>Comp%</th><th>Cancel%</th><th>Open</th><th>MedComp</th><th>MedResp</th><th>Adoption</th><th>Sentiment</th></tr></thead><tbody>';
    names.forEach(function(sn){
      var sm=WO.stations[sn],sc2=parseFloat(p2(sm.completed,sm.total)),sx=parseFloat(p2(sm.cancelled,sm.total));
      var ad=ADOPTION[sn],adVal=ad?ad.adoption.toFixed(1)+'%':'—',adC=ad?(ad.adoption>=85?'gr':ad.adoption>=70?'ye':'re'):'';
      var ss=SENTIMENT.filter(function(x){return x.station===sn}),sentVal='—',sentC='';
      if(ss.length){var t2=0,ta=0;ss.forEach(function(x){t2+=x.responses;ta+=x.avg*x.responses});if(t2){var av=ta/t2;sentVal=av.toFixed(1)+'/5';sentC=scv(av)}}
      h+='<tr><td><strong>'+sn+'</strong></td><td>'+sm.total+'</td><td><span class="bg '+cc(sc2)+'">'+sc2+'%</span></td><td><span class="bg '+cc(sx,false)+'">'+sx+'%</span></td><td>'+sm.open+'</td><td>'+sm.median_comp_hrs+'h</td><td>'+sm.median_resp_hrs+'h</td><td>'+(adC?'<span class="bg '+adC+'">'+adVal+'</span>':adVal)+'</td><td>'+(sentC?'<span class="bg '+sentC+'">'+sentVal+'</span>':sentVal)+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  h+='</div>';
  document.getElementById('root').innerHTML=h;
  document.querySelectorAll('.tabs button').forEach(function(btn){btn.addEventListener('click',function(){cur=btn.dataset.t;build();window.scrollTo(0,0)})});
  setTimeout(function(){renderCharts(cur)},50);
}
build();
</script>
</body>
</html>
